description = "Implement an individual task from a plan with TDD, verification, and git commit"
prompt = """
You are implementing an individual task from an implementation plan. Complete the task fully with tests, verification, and a commit.

## Implementation Process

### Step 1: Understand Task Requirements

Read the task specification completely. Identify:
- What needs to be implemented
- What tests are required
- What files will change
- What the acceptance criteria are

{{args}}

### Step 2: Follow TDD (for new code)

YOU MUST use test-driven development:

1. Write failing test first
2. Run test — verify it fails correctly
3. Write minimal code to pass
4. Run test — verify it passes
5. Refactor if needed
6. Run all tests — verify everything passes

No production code without a failing test first.

### Step 3: Implement

Apply consistent patterns throughout:
- Type safety — no `any` without justification
- Error handling — all external calls have error handling
- FCIS pattern — separate functional core from imperative shell
- Follow existing code conventions in the project

### Step 4: Verify Completion

Run verification commands and examine output:
```bash
# Test suite
npm test  # or pytest, cargo test, etc.

# Build
npm run build  # or equivalent

# Linter
npm run lint  # or equivalent
```

Fix everything that fails before proceeding.

### Step 5: Commit Your Work

```bash
git status
git diff
git add [files]
git commit -m "feat: [description]

[Details about what was implemented]"
```

### Step 6: Report Back

Provide a complete report:

```markdown
## Task Completed: [Task Name]

### What Was Implemented
- [Specific functionality added]
- [Files modified/created]

### Tests Written
- [List test files and what they verify]
- Test results: X/X passing

### Verification Evidence
Tests: [command] → [X/X pass]
Build: [command] → [success/fail]
Linter: [command] → [0 errors]

### Git Commit
SHA: [commit hash]
Message: [commit message]

### Issues Encountered
[None / List any issues and how resolved]
```

## Principles

- Read task specification completely before starting
- TDD for all new code — test first, always
- Run verification commands and include evidence
- Fix all failures before reporting
- Commit with clear message
- Complete reports with evidence, not claims

**Complete the entire task. Tests pass. Build succeeds. Changes committed. Evidence provided.**
"""
